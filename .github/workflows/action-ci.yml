name: Windows Calculator Continuous Integration Pipeline
run-name: WinCalc-CI-0.${{ github.run_number }}.x.x
on:
  push:
    branches: [main, release/**, feature/**]
  pull_request:
    branches: [main, release/**, feature/**]
  workflow_dispatch:
jobs:
  defineBuilds:
    name: Define builds
    runs-on: windows-latest 
    outputs:
      version: $
      platformList: $
    steps:
      - name: Generate version number
        id: version
        run: |
          $hashedRunId = ${{ github.run_id }} % 100000
          echo 'version="0.${{ github.run_number }}.$hashedRunId.${{ github.run_attempt }}"' >> $env:GITHUB_OUTPUT
        shell: pwsh
      - name: Choose platforms
        id: platformList
        run: |
          if ($env:RunAll) {
            echo 'platformList=["x64", "x86", "ARM64", "ARM"]' >> $env:GITHUB_OUTPUT
            echo 'Run all.'
          }
          else {
            echo 'platformList=["x64"]' >> $env:GITHUB_OUTPUT
            echo 'Run x64 only.'
          }
          echo '$env:GITHUB_OUTPUT'
          cat $env:GITHUB_OUTPUT
        shell: pwsh
        env:
          RunAll: ${{ github.event_name != 'pull_request' }}

  build:
    needs: defineBuilds
    name: Build
    runs-on: windows-latest
    strategy:
      matrix:
        platform: ${{ fromJSON(needs.defineBuilds.outputs.platformList) }}
    steps:
    - uses: actions/checkout@v4
    - uses: nuget/setup-nuget@v2
      name: Use NuGet 6.x
      with:
        nuget-version: '6.x'
    - run: nuget restore ./src/Calculator.sln
      name: Restore Nuget dependencies
    - run: |
        $version = ${{ fromJSON(needs.defineBuilds.outputs.version) }}
        echo 'version = $version'
        ./build/scripts/UpdateAppxManifestVersion.ps1 `
          -AppxManifest ./src/Calculator/Package.appxmanifest `
          -Version $version
      shell: pwsh
      name: Set version number in AppxManifest
    - uses: microsoft/setup-msbuild@v2
      name: Add MSBuild to PATH
    - run: |
        $version = ${{ fromJSON(needs.defineBuilds.outputs.version) }}
        msbuild ./src/Calculator.sln `
          -bl:./output/${{ matrix.platform }}/Calculator.binlog `
          -p:OutDir=./output/${{ matrix.platform }}/ `
          -p:Platform=${{ matrix.platform }} `
          -p:Configuration=Release `
          -p:GenerateProjectSpecificOutputFolder=true `
          -p:Version=$version `
          -maxCpuCount `
          -t:Publish `
          -p:PublishDir=./output/${{ matrix.platform }}/publish
      shell: pwsh
      name: Build Calculator.sln
